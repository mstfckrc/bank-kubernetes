apiVersion: v1
kind: Secret
metadata:
  name: bank-secrets
  namespace: default
type: Opaque
stringData:
  # 🗄️ Veritabanı Şifreleri
  CORE_DB_USER: "postgres"
  CORE_DB_PASS: "YOUR_CORE_DB_PASSWORD"
  AUTH_DB_USER: "postgres"
  AUTH_DB_PASS: "YOUR_AUTH_DB_PASSWORD"
  BILL_DB_USER: "postgres"
  BILL_DB_PASS: "YOUR_BILL_DB_PASSWORD"
  CORP_DB_USER: "postgres"
  CORP_DB_PASS: "YOUR_CORP_DB_PASSWORD"
  KC_DB_USER: "keycloak"
  KC_DB_PASS: "YOUR_KEYCLOAK_DB_PASSWORD"
  
  # 🔐 Keycloak ve RabbitMQ Kullanıcıları
  KC_ADMIN_USER: "admin"
  KC_ADMIN_PASS: "YOUR_ADMIN_PASSWORD"
  KEYCLOAK_CLIENT_SECRET: "YOUR_CLIENT_SECRET_HERE"
  RMQ_USER: "admin"
  RMQ_PASS: "YOUR_RMQ_PASSWORD"
  
  # 🔑 Gizli Anahtarlar
  JWT_SECRET: "YOUR_JWT_SECRET_KEY_HERE"
  RECAPTCHA_SECRET: "YOUR_RECAPTCHA_SECRET_HERE"
  
  # 📊 Grafana
  GRAFANA_USER: "admin"
  GRAFANA_PASS: "YOUR_GRAFANA_PASSWORD"