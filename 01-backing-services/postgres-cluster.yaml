# ================= 1. AUTH DATABASE =================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pvc-postgres-auth
  namespace: default
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: longhorn
  resources: { requests: { storage: 1Gi } }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-auth
  namespace: default
spec:
  replicas: 1
  selector: { matchLabels: { app: postgres-auth } }
  template:
    metadata: { labels: { app: postgres-auth } }
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports: [{ containerPort: 5432 }]
        env:
        - name: POSTGRES_DB
          value: "bank_auth_db"
        - name: POSTGRES_USER
          valueFrom: { secretKeyRef: { name: bank-secrets, key: AUTH_DB_USER } }
        - name: POSTGRES_PASSWORD
          valueFrom: { secretKeyRef: { name: bank-secrets, key: AUTH_DB_PASS } }
        - name: PGDATA
          value: "/var/lib/postgresql/data/pgdata"
        volumeMounts: [{ name: pgdata, mountPath: /var/lib/postgresql/data }]
      volumes: [{ name: pgdata, persistentVolumeClaim: { claimName: pvc-postgres-auth } }]
---
